<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoTrack – Job Management</title>

  <link rel="stylesheet" href="/static/dashboard.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

</head>

<body>

  <div id="sidebar-container"></div>

  <main class="main-content">

    <div id="header-container"></div>

    <div class="controls-bar">
      <div class="filter-tabs">
        <a href="#" class="filter-tab active">All Jobs</a>
        <a href="#" class="filter-tab">Open</a>
        <a href="#" class="filter-tab">Closed</a>
      </div>
      <button class="create-btn">
        <i class="ph ph-plus"></i> Create New Job
      </button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Job Title</th>
            <th>Department</th>
            <th>Location</th>
            <th>Applicants</th>
            <th>Posted</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

  </main>

  <script src="/static/config.js"></script>
  <script src="/static/sidebar.js"></script>
  <script>
    loadSidebar('jobs');
  </script>

  <div id="jobModal" class="modal-backdrop">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Create New Job</h3>
        <button class="close-modal-btn"><i class="ph ph-x"></i></button>
      </div>

      <form id="createJobForm">
        <div class="form-group">
          <label>Job Title</label>
          <input type="text" id="jobTitle" placeholder="e.g. Senior Frontend Developer" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Department</label>
            <select id="jobDept">
              <option value="Engineering">Engineering</option>
              <option value="Product">Product</option>
              <option value="Marketing">Marketing</option>
              <option value="Design">Design</option>
              <option value="Sales">Sales</option>
            </select>
          </div>
          <div class="form-group">
            <label>Type</label>
            <select id="jobType">
              <option value="Full-time">Full-time</option>
              <option value="Part-time">Part-time</option>
              <option value="Contract">Contract</option>
              <option value="Internship">Internship</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" id="jobLoc" placeholder="e.g. Remote" required>
        </div>

        <div class="form-group">
          <label>Description (Short)</label>
          <textarea id="jobDesc" rows="3" placeholder="Brief description of the role..."></textarea>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-cancel close-modal-btn">Cancel</button>
          <button type="submit" class="btn-submit">Create Job</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/job.js"></script>
  <script src="/static/header.js"></script>
  <script src="/static/footer.js"></script>

  <script>
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      window.location.replace(`${CONFIG.API_BASE_URL}/`);
    }

    loadSidebar('jobs');
    loadHeader('Jobs');
    loadFooter();
  </script>
</body>

</html>
