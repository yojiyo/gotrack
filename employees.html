<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoTrack – Employee Management</title>

  <link rel="stylesheet" href="/static/dashboard.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    .toolbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .search-group {
      display: flex;
      gap: 12px;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 8px 12px;
      width: 300px;
    }

    .search-box input {
      border: none;
      outline: none;
      margin-left: 8px;
      width: 100%;
      font-size: 14px;
    }

    .search-box i {
      color: #94a3b8;
      font-size: 18px;
    }

    .btn-filter {
      background: white;
      border: 1px solid #e2e8f0;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #475569;
      font-weight: 500;
      font-size: 14px;
    }

    .btn-add {
      background: #0284c7;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .btn-add:hover {
      background: #0284c7;
    }

    .table-container {
      background: white;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 16px 24px;
      font-size: 11px;
      font-weight: 700;
      color: #ffffff;
      text-transform: uppercase;
      background: #232e49;
      border-bottom: 1px solid #e2e8f0;
    }

    td {
      padding: 16px 24px;
      font-size: 14px;
      color: #3a3c3f;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
    }

    .user-info-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #dbeafe;
      color: #1e40af;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
    }

    .user-text {
      display: flex;
      flex-direction: column;
    }

    .user-text .name {
      font-weight: 600;
      color: #0f172a;
      font-size: 14px;
    }

    .user-text .email {
      font-size: 12px;
      color: #64748b;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge.onboarding {
      background: #ede9fe;
      color: #7c3aed !important;
    }

    .badge.active {
      background: #dcfce7;
      color: #15803d;
    }

    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      font-size: 18px;
    }

    .action-btn:hover {
      color: #2563eb;
    }

    .filter-dropdown {
      display: none;
      position: absolute;
      top: 110%;
      right: 0;
      width: 240px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      padding: 16px;
      z-index: 100;
    }

    .filter-dropdown.show {
      display: block;
      animation: fadeIn 0.2s ease-out;
    }

    .filter-group {
      margin-bottom: 12px;
    }

    .filter-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .filter-group select {
      width: 100%;
      padding: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 13px;
      color: #334155;
      outline: none;
    }

    .filter-actions {
      margin-top: 16px;
      text-align: right;
      border-top: 1px solid #f1f5f9;
      padding-top: 12px;
    }

    .btn-primary-small {
      background: #2563eb;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .badge.pre-employment {
      background: #ffedd5;
      color: #ea580c;
      border-color: #fed7aa;
    }

    .badge.regularization {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .badge.exit-interview {
      background: #fef9c3;
      color: #ca8a04;
    }

    .badge.departure {
      background: #fee2e2;
      color: #dc2626;
    }
  </style>
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="main-content">
    <div id="header-container"></div>

    <div class="toolbar">
      <div class="search-group">
        <div class="search-box">
          <i class="ph ph-magnifying-glass"></i>
          <input type="text" placeholder="Search employees...">
        </div>

        <div style="position: relative;">
          <button class="btn-filter" onclick="toggleFilterMenu('employeeFilter')">
            <i class="ph ph-funnel"></i> Filter
          </button>
          <div id="employeeFilter" class="filter-dropdown">
            <div class="filter-group">
              <label>Department</label>
              <select id="filterDept">
                <option value="all">All Departments</option>
              </select>
            </div>
            <div class="filter-group">
              <label>Status</label>
              <select id="filterStatus">
                <option value="all">All Statuses</option>
                <option value="Active">Active</option>
                <option value="Pre-Employment">Pre-Employment</option>
                <option value="Onboarding">Onboarding</option>
                <option value="Regularization">Regularization</option>
                <option value="Exit Interview">Exit Interview</option>
                <option value="Departure">Departure</option>
              </select>
            </div>
            <div class="filter-actions">
              <button class="btn-primary-small" onclick="applyEmployeeFilters()">Apply Filters</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="table-container">

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Employee</th>
              <th>Role</th>
              <th>Department</th>
              <th>Join Date</th>
              <th>Status</th>
              <th style="text-align: right;">Actions</th>
            </tr>
          </thead>
          <tbody id="employeeTableBody">
          </tbody>
        </table>
      </div>

  </main>

  <script src="/static/config.js"></script>
  <script src="/static/sidebar.js"></script>
  <script src="/static/header.js"></script>
  <script src="/static/employees.js"></script>
  <script src="/static/footer.js"></script>

  <script>
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      window.location.replace(`${CONFIG.API_BASE_URL}/`);
    }

    loadSidebar('employees');
    loadHeader('Employee Management');
    loadFooter();
  </script>

</body>

</html>
</body>

</html>
